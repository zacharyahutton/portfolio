<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Phone Store API cover">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0518"/>
      <stop offset="45%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="phone" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e1033"/>
      <stop offset="100%" stop-color="#0d0618"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="200" cy="500" r="280" fill="#ec4899" opacity="0.06"/>
  <circle cx="1000" cy="130" r="220" fill="#8b5cf6" opacity="0.08"/>
  <!-- Phone outline -->
  <g transform="translate(420,80)">
    <rect x="0" y="0" width="360" height="470" rx="48" fill="#120818" stroke="url(#phone)" stroke-width="3"/>
    <rect x="28" y="60" width="304" height="360" rx="20" fill="url(#screen)" stroke="#ec489955" stroke-width="1"/>
    <rect x="130" y="20" width="100" height="16" rx="8" fill="#2d1b4e"/>
    <!-- Commerce UI mock -->
    <rect x="52" y="90" width="256" height="72" rx="12" fill="#ec489922" stroke="#ec489944" stroke-width="1"/>
    <text x="72" y="125" fill="#f9a8d4" font-family="system-ui,sans-serif" font-size="16" font-weight="600">iPhone 16 Pro</text>
    <text x="72" y="148" fill="#c4b5fd" font-family="system-ui,sans-serif" font-size="14">$999 · In stock</text>
    <rect x="52" y="180" width="256" height="48" rx="24" fill="url(#phone)" opacity="0.85"/>
    <text x="180" y="210" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="15" font-weight="600">Add to Cart</text>
    <rect x="52" y="250" width="120" height="100" rx="10" fill="#8b5cf622" stroke="#8b5cf644" stroke-width="1"/>
    <rect x="188" y="250" width="120" height="100" rx="10" fill="#8b5cf622" stroke="#8b5cf644" stroke-width="1"/>
    <circle cx="112" cy="300" r="24" fill="#ec489933"/>
    <circle cx="248" cy="300" r="24" fill="#8b5cf633"/>
  </g>
  <text x="600" y="590" text-anchor="middle" fill="#fdfdfd" font-family="system-ui,sans-serif" font-size="44" font-weight="700">Phone Store API</text>
  <text x="600" y="620" text-anchor="middle" fill="#c4b5fd" font-family="system-ui,sans-serif" font-size="22">Express · MongoDB · Cart · Webhooks</text>
</svg>
