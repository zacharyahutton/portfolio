<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="StudySync API cover">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0a1a"/>
      <stop offset="50%" stop-color="#151238"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f0d24"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#6366f1" stroke-width="0.5" opacity="0.12"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Dashboard panel -->
  <rect x="60" y="70" width="680" height="490" rx="18" fill="url(#panel)" stroke="#6366f1" stroke-width="1.5" opacity="0.9"/>
  <rect x="60" y="70" width="680" height="48" rx="18" fill="#4338ca" opacity="0.35"/>
  <circle cx="92" cy="94" r="7" fill="#ef4444" opacity="0.8"/>
  <circle cx="116" cy="94" r="7" fill="#f59e0b" opacity="0.8"/>
  <circle cx="140" cy="94" r="7" fill="#22c55e" opacity="0.8"/>
  <text x="100" y="160" fill="#818cf8" font-family="monospace" font-size="20">GET /api/v1/deadlines</text>
  <text x="100" y="195" fill="#64748b" font-family="monospace" font-size="16">Authorization: Bearer eyJhbG...</text>
  <text x="100" y="250" fill="#6366f1" font-family="monospace" font-size="18">{</text>
  <text x="120" y="285" fill="#c7d2fe" font-family="monospace" font-size="17">"course": "Data Structures",</text>
  <text x="120" y="320" fill="#c7d2fe" font-family="monospace" font-size="17">"due": "2026-04-15",</text>
  <text x="120" y="355" fill="#a5b4fc" font-family="monospace" font-size="17">"status": "pending"</text>
  <text x="100" y="390" fill="#6366f1" font-family="monospace" font-size="18">}</text>
  <!-- Calendar icon -->
  <g transform="translate(820,120)">
    <rect x="0" y="20" width="280" height="260" rx="16" fill="#1e1b4b" stroke="#818cf8" stroke-width="2"/>
    <rect x="0" y="20" width="280" height="56" rx="16" fill="#4338ca"/>
    <rect x="0" y="56" width="280" height="20" fill="#4338ca"/>
    <rect x="40" y="0" width="16" height="48" rx="6" fill="#818cf8"/>
    <rect x="224" y="0" width="16" height="48" rx="6" fill="#818cf8"/>
    <g fill="#4338ca" opacity="0.6">
      <rect x="32" y="110" width="48" height="40" rx="6"/>
      <rect x="96" y="110" width="48" height="40" rx="6"/>
      <rect x="160" y="110" width="48" height="40" rx="6"/>
      <rect x="224" y="110" width="48" height="40" rx="6"/>
      <rect x="32" y="170" width="48" height="40" rx="6"/>
      <rect x="96" y="170" width="48" height="40" rx="6" fill="#6366f1" opacity="1"/>
      <rect x="160" y="170" width="48" height="40" rx="6"/>
      <rect x="224" y="170" width="48" height="40" rx="6"/>
    </g>
  </g>
  <text x="960" y="460" text-anchor="middle" fill="#fdfdfd" font-family="system-ui,sans-serif" font-size="56" font-weight="700" letter-spacing="-0.02em">StudySync</text>
  <text x="960" y="510" text-anchor="middle" fill="#a5b4fc" font-family="system-ui,sans-serif" font-size="22">FastAPI · JWT · SQLAlchemy</text>
  <text x="1140" y="610" text-anchor="end" fill="#4338ca" font-family="system-ui,sans-serif" font-size="14" opacity="0.5">API</text>
</svg>
