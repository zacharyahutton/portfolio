      <stop offset="0%" stop-color="#1a0f0a"/>
      <stop offset="50%" stop-color="#2d1810"/>
      <stop offset="100%" stop-color="#e07050"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff08" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect x="80" y="100" width="520" height="380" rx="16" fill="#0d0d0d" stroke="#e0705044" stroke-width="2"/>
  <text x="120" y="160" fill="#e07050" font-family="monospace" font-size="22">GET /api/v1/deadlines</text>
