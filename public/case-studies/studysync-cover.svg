  <text x="140" y="330" fill="#d4d4d4" font-family="monospace" font-size="18">"due": "2026-04-15",</text>
  <text x="140" y="365" fill="#d4d4d4" font-family="monospace" font-size="18">"status": "pending"</text>
  <text x="120" y="400" fill="#5ee87a" font-family="monospace" font-size="18">}</text>
  <text x="700" y="280" fill="#fdfdfd" font-family="system-ui,sans-serif" font-size="56" font-weight="600">StudySync</text>
  <text x="700" y="340" fill="#d4d4d4" font-family="system-ui,sans-serif" font-size="28">FastAPI · JWT · SQLAlchemy</text>
</svg>
