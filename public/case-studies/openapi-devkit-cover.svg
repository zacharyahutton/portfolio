<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="OpenAPI DevKit cover">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#041210"/>
      <stop offset="50%" stop-color="#0a2824"/>
      <stop offset="100%" stop-color="#0e4d47"/>
    </linearGradient>
    <linearGradient id="term" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d3330"/>
      <stop offset="100%" stop-color="#061816"/>
    </linearGradient>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#14b8a6" opacity="0.03"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#scan)"/>
  <!-- Spec panel -->
  <rect x="60" y="80" width="480" height="470" rx="14" fill="#0a201e" stroke="#14b8a6" stroke-width="1.5" opacity="0.85"/>
  <text x="100" y="130" fill="#2dd4bf" font-family="monospace" font-size="20">openapi: 3.0.3</text>
  <text x="100" y="170" fill="#5eead4" font-family="monospace" font-size="18">info:</text>
  <text x="120" y="205" fill="#99f6e4" font-family="monospace" font-size="17">title: Pet Store API</text>
  <text x="100" y="250" fill="#5eead4" font-family="monospace" font-size="18">paths:</text>
  <text x="120" y="285" fill="#99f6e4" font-family="monospace" font-size="17">/pets:</text>
  <text x="140" y="320" fill="#ccfbf1" font-family="monospace" font-size="17">get:</text>
  <text x="160" y="355" fill="#14b8a6" font-family="monospace" font-size="17">operationId: listPets</text>
  <!-- Terminal / codegen -->
  <rect x="580" y="80" width="560" height="470" rx="14" fill="url(#term)" stroke="#0d9488" stroke-width="1.5"/>
  <rect x="580" y="80" width="560" height="44" rx="14" fill="#115e59"/>
  <rect x="580" y="108" width="560" height="16" fill="#115e59"/>
  <circle cx="612" cy="102" r="7" fill="#ef4444" opacity="0.7"/>
  <circle cx="636" cy="102" r="7" fill="#f59e0b" opacity="0.7"/>
  <circle cx="660" cy="102" r="7" fill="#22c55e" opacity="0.7"/>
  <text x="610" y="160" fill="#2dd4bf" font-family="monospace" font-size="18">$ openapi-devkit generate</text>
  <text x="610" y="200" fill="#64748b" font-family="monospace" font-size="16">Reading spec... OK</text>
  <text x="610" y="240" fill="#5eead4" font-family="monospace" font-size="16">Generated client.ts</text>
  <text x="610" y="280" fill="#5eead4" font-family="monospace" font-size="16">Generated schemas.zod.ts</text>
  <text x="610" y="320" fill="#14b8a6" font-family="monospace" font-size="16">export async function listPets() {</text>
  <text x="630" y="355" fill="#99f6e4" font-family="monospace" font-size="15">return fetch('/pets').then(r =&gt; r.json())</text>
  <text x="610" y="390" fill="#14b8a6" font-family="monospace" font-size="16">}</text>
  <text x="610" y="440" fill="#0d9488" font-family="monospace" font-size="15">? Postman collection exported</text>
  <!-- Arrow between panels -->
  <path d="M560 315 L580 315" stroke="#2dd4bf" stroke-width="3"/>
  <polygon points="575,310 585,315 575,320" fill="#2dd4bf"/>
  <text x="600" y="590" text-anchor="middle" fill="#fdfdfd" font-family="system-ui,sans-serif" font-size="48" font-weight="700" letter-spacing="-0.02em">OpenAPI DevKit</text>
  <text x="600" y="620" text-anchor="middle" fill="#5eead4" font-family="system-ui,sans-serif" font-size="22">TypeScript · Zod · CLI codegen</text>
</svg>
