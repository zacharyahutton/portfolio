<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Library Management DB cover">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="120" y="100" width="960" height="380" rx="16" fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <text x="160" y="160" fill="#79c0ff" font-family="monospace" font-size="22">SELECT b.title, u.name, b.due_date</text>
  <text x="160" y="200" fill="#d4d4d4" font-family="monospace" font-size="20">FROM borrowings b</text>
  <text x="160" y="240" fill="#d4d4d4" font-family="monospace" font-size="20">JOIN users u ON b.user_id = u.id</text>
  <text x="160" y="280" fill="#d4d4d4" font-family="monospace" font-size="20">WHERE b.returned_at IS NULL;</text>
  <text x="600" y="400" text-anchor="middle" fill="#fdfdfd" font-family="system-ui,sans-serif" font-size="44" font-weight="600">Library DB</text>
  <text x="600" y="450" text-anchor="middle" fill="#a3a3a3" font-family="system-ui,sans-serif" font-size="24">PostgreSQL Ę ER Modelling Ę 3NF</text>
</svg>
