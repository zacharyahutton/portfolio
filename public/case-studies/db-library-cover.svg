<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Library Management DB cover">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030712"/>
      <stop offset="50%" stop-color="#0c1929"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="table" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- ER schema diagram -->
  <g>
    <rect x="80" y="120" width="220" height="140" rx="10" fill="url(#table)" stroke="#3b82f6" stroke-width="2"/>
    <text x="190" y="155" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="18" font-weight="700">users</text>
    <line x1="100" y1="170" x2="280" y2="170" stroke="#3b82f655" stroke-width="1"/>
    <text x="110" y="200" fill="#bfdbfe" font-family="monospace" font-size="14">id PK</text>
    <text x="110" y="225" fill="#93c5fd" font-family="monospace" font-size="14">name</text>
    <text x="110" y="250" fill="#93c5fd" font-family="monospace" font-size="14">email</text>
    <rect x="380" y="120" width="240" height="160" rx="10" fill="url(#table)" stroke="#3b82f6" stroke-width="2"/>
    <text x="500" y="155" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="18" font-weight="700">borrowings</text>
    <line x1="400" y1="170" x2="600" y2="170" stroke="#3b82f655" stroke-width="1"/>
    <text x="410" y="200" fill="#bfdbfe" font-family="monospace" font-size="14">id PK</text>
    <text x="410" y="225" fill="#60a5fa" font-family="monospace" font-size="14">user_id FK</text>
    <text x="410" y="250" fill="#60a5fa" font-family="monospace" font-size="14">book_id FK</text>
    <text x="410" y="275" fill="#93c5fd" font-family="monospace" font-size="14">due_date</text>
    <rect x="700" y="120" width="220" height="140" rx="10" fill="url(#table)" stroke="#3b82f6" stroke-width="2"/>
    <text x="810" y="155" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="18" font-weight="700">books</text>
    <line x1="720" y1="170" x2="900" y2="170" stroke="#3b82f655" stroke-width="1"/>
    <text x="730" y="200" fill="#bfdbfe" font-family="monospace" font-size="14">id PK</text>
    <text x="730" y="225" fill="#93c5fd" font-family="monospace" font-size="14">title</text>
    <text x="730" y="250" fill="#93c5fd" font-family="monospace" font-size="14">isbn</text>
    <!-- FK lines -->
    <line x1="300" y1="200" x2="380" y2="200" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="620" y1="200" x2="700" y2="200" stroke="#60a5fa" stroke-width="2"/>
  </g>
  <!-- SQL snippet -->
  <rect x="80" y="320" width="840" height="160" rx="12" fill="#0f172a" stroke="#1e40af" stroke-width="1.5" opacity="0.9"/>
  <text x="110" y="360" fill="#60a5fa" font-family="monospace" font-size="17">SELECT b.title, u.name, br.due_date</text>
  <text x="110" y="390" fill="#93c5fd" font-family="monospace" font-size="16">FROM borrowings br JOIN users u ON br.user_id = u.id</text>
  <text x="110" y="420" fill="#93c5fd" font-family="monospace" font-size="16">JOIN books b ON br.book_id = b.id WHERE br.returned_at IS NULL;</text>
  <text x="600" y="540" text-anchor="middle" fill="#fdfdfd" font-family="system-ui,sans-serif" font-size="44" font-weight="700">Library DB</text>
  <text x="600" y="580" text-anchor="middle" fill="#93c5fd" font-family="system-ui,sans-serif" font-size="24">PostgreSQL · ER Modelling · 3NF</text>
</svg>
