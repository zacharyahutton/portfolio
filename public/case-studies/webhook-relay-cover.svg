<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Webhook Relay API cover">
  <defs>
    <linearGradient id="bg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0a0705"/>
      <stop offset="40%" stop-color="#1a1008"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="node" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <radialGradient id="pulse" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#fbbf24"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="600" cy="315" rx="420" ry="180" fill="url(#pulse)"/>
  <!-- Flow nodes -->
  <g>
    <rect x="120" y="255" width="160" height="120" rx="20" fill="#1c1410" stroke="url(#node)" stroke-width="2.5"/>
    <text x="200" y="310" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="18" font-weight="600">API</text>
    <text x="200" y="340" text-anchor="middle" fill="#a8a29e" font-family="monospace" font-size="13">POST /relay</text>
    <!-- Arrow 1 -->
    <line x1="290" y1="315" x2="390" y2="315" stroke="#fbbf24" stroke-width="3" marker-end="url(#arrow)" opacity="0.9"/>
    <rect x="400" y="255" width="160" height="120" rx="20" fill="#1c1410" stroke="url(#node)" stroke-width="2.5"/>
    <text x="480" y="310" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="18" font-weight="600">Queue</text>
    <text x="480" y="340" text-anchor="middle" fill="#a8a29e" font-family="monospace" font-size="13">Redis</text>
    <!-- Arrow 2 -->
    <line x1="570" y1="315" x2="670" y2="315" stroke="#fbbf24" stroke-width="3" marker-end="url(#arrow)" opacity="0.9"/>
    <rect x="680" y="255" width="160" height="120" rx="20" fill="#1c1410" stroke="url(#node)" stroke-width="2.5"/>
    <text x="760" y="310" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="18" font-weight="600">HMAC</text>
    <text x="760" y="340" text-anchor="middle" fill="#a8a29e" font-family="monospace" font-size="13">Sign</text>
    <!-- Arrow 3 -->
    <line x1="850" y1="315" x2="950" y2="315" stroke="#fbbf24" stroke-width="3" marker-end="url(#arrow)" opacity="0.9"/>
    <rect x="960" y="255" width="120" height="120" rx="60" fill="#1c1410" stroke="url(#node)" stroke-width="2.5"/>
    <text x="1020" y="320" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="16" font-weight="600">Hook</text>
  </g>
  <!-- Retry loop arc -->
  <path d="M480 400 Q600 480 760 400" fill="none" stroke="#d97706" stroke-width="2" stroke-dasharray="8 6" opacity="0.5"/>
  <text x="600" y="455" text-anchor="middle" fill="#92400e" font-family="monospace" font-size="14">exponential backoff</text>
  <text x="600" y="140" text-anchor="middle" fill="#fdfdfd" font-family="system-ui,sans-serif" font-size="52" font-weight="700" letter-spacing="-0.02em">Webhook Relay</text>
  <text x="600" y="195" text-anchor="middle" fill="#fcd34d" font-family="system-ui,sans-serif" font-size="24">HMAC · Redis · Rate limits</text>
  <text x="1140" y="610" text-anchor="end" fill="#78350f" font-family="system-ui,sans-serif" font-size="14" opacity="0.6">RELAY</text>
</svg>
