<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="PNTCOG Ministry Platform cover">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1028"/>
      <stop offset="45%" stop-color="#2d1f4a"/>
      <stop offset="100%" stop-color="#3d2a12"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5d78e"/>
      <stop offset="100%" stop-color="#c9a227"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#c9a227" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#c9a227" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="1.2" fill="#ffffff" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <!-- Community circle motif -->
  <circle cx="600" cy="260" r="140" fill="none" stroke="#c9a227" stroke-width="1.5" opacity="0.35"/>
  <circle cx="600" cy="260" r="100" fill="none" stroke="#8b6bb8" stroke-width="1" opacity="0.3"/>
  <!-- Subtle cross -->
  <g transform="translate(600,260)" opacity="0.85">
    <rect x="-6" y="-48" width="12" height="96" rx="3" fill="url(#gold)"/>
    <rect x="-36" y="-18" width="72" height="12" rx="3" fill="url(#gold)"/>
  </g>
  <!-- People silhouettes -->
  <g fill="#c9a227" opacity="0.5">
    <circle cx="420" cy="320" r="22"/>
    <path d="M420 350 Q420 390 380 420 L460 420 Q420 390 420 350"/>
    <circle cx="780" cy="320" r="22"/>
    <path d="M780 350 Q780 390 740 420 L820 420 Q780 390 780 350"/>
    <circle cx="520" cy="380" r="18"/>
    <path d="M520 404 Q520 436 488 460 L552 460 Q520 436 520 404"/>
    <circle cx="680" cy="380" r="18"/>
    <path d="M680 404 Q680 436 648 460 L712 460 Q680 436 680 404"/>
  </g>
  <!-- Decorative arch -->
  <path d="M200 520 Q600 420 1000 520" fill="none" stroke="#8b6bb8" stroke-width="2" opacity="0.4"/>
  <text x="600" y="540" text-anchor="middle" fill="#fdfdfd" font-family="system-ui,sans-serif" font-size="52" font-weight="600" letter-spacing="-0.02em">PNTCOG</text>
  <text x="600" y="590" text-anchor="middle" fill="#d4c4a8" font-family="system-ui,sans-serif" font-size="24">Ministry Platform · Events · Giving · Prayer</text>
</svg>
